<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Observatory - RaftBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Asymmetric Layout approach -->
        <aside class="inspector-panel">
            <header>
                <h1 class="font-display primary-gradient-text">Kinetic Observatory</h1>
            </header>
            
            <section class="system-status surface-container-high">
                <h2 class="font-body">Cluster Health</h2>
                <div class="status-indicator">
                    <span class="pulse-dot" id="conn-state-pulse"></span>
                    <span id="conn-status" class="font-mono">Connecting...</span>
                </div>
            </section>
            
            <section class="system-logs surface-container-lowest">
                <div class="log-label font-body">Node Information</div>
                <div class="log-line font-mono">Leader: <strong id="leader-id">Discovery...</strong></div>
                <div class="log-line font-mono">Replicas: <strong id="cluster-status">Polling...</strong></div>
            </section>

            <section class="controls surface-container-high">
                <h2 class="font-body">Tool Config</h2>
                <div class="tool-group">
                    <label class="font-body">Mode</label>
                    <button id="eraser-btn" class="btn-toggle">Use Eraser</button>
                </div>
                <div class="tool-group">
                    <label class="font-body">Color</label>
                    <input type="color" id="color-picker" value="#00daf3">
                </div>
                <div class="tool-group">
                    <label class="font-body">Thickness</label>
                    <input type="range" id="width-picker" min="1" max="20" value="3">
                </div>
                <button id="clear-btn" class="btn-primary">Clear Local</button>
            </section>
        </aside>

        <main class="canvas-expanse surface-container-lowest">
            <canvas id="drawing-canvas"></canvas>
        </main>
    </div>
    <script type="module" src="/dist/frontend/src/app.js"></script>
</body>
</html>
